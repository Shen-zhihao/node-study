# Docker Compose：用一个 YAML 文件描述「要跑哪些服务」，一条命令全部拉起。
# 启动：docker compose up -d     （-d = 后台运行）
# 停止：docker compose down       （加 -v 连数据一起删）
# 查看：docker compose ps

services:
  # 服务名叫 postgres，下面 Prisma 连接时主机地址就用 localhost（因为端口映射到了本机）。
  postgres:
    image: postgres:17-alpine # alpine = 精简版镜像，体积小
    container_name: node-study-postgres
    restart: unless-stopped # 除非手动停，否则开机/崩溃自动重启

    # 这些环境变量是 postgres 镜像约定的：首次启动时用它们初始化数据库和账号。
    # ${...} 会从项目根目录的 .env 文件自动读取，避免把密码写死在这里。
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    # 端口映射「本机端口:容器内端口」。容器内 PG 永远是 5432，映射到本机的可配端口。
    ports:
      - '${POSTGRES_PORT}:5432'

    # 数据卷：把数据库文件存到一个「命名卷」里。
    # 这样 down/up 容器后数据还在，不会一重启就清空（除非 down -v）。
    volumes:
      - pgdata:/var/lib/postgresql/data

    # 健康检查：让 Docker 知道 PG 是否「真的准备好接受连接」了。
    # 后面 Prisma/应用可以等它 healthy 再启动。
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

# 声明上面用到的命名卷。数据由 Docker 托管，不在项目目录里。
volumes:
  pgdata:
